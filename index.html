<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Polla Mundialista 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============================================================
       PANTALLA DE LOGIN
       ============================================================ -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="trophy">🏆</div>
        <h1>Polla Mundialista</h1>
        <p>FIFA 2026 · Ecuador</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="input-user">Usuario</label>
          <input type="text" id="input-user" placeholder="Tu nombre" autocomplete="username" autocorrect="off" autocapitalize="off">
        </div>
        <div class="form-group">
          <label for="input-pass">Contraseña</label>
          <input type="password" id="input-pass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Entrar ⚽</button>
        <p id="login-error" class="login-error"></p>
      </form>
    </div>
  </div>

  <!-- ============================================================
       APP PRINCIPAL
       ============================================================ -->
  <div id="app-screen" class="screen" hidden>

    <!-- Header -->
    <header class="app-header">
      <div class="header-brand">
        <span>⚽</span> Polla 2026
      </div>
      <div class="header-right">
        <span id="header-username" class="header-username"></span>
        <span id="header-points" class="header-points" hidden></span>
        <button id="logout-btn" class="btn-logout">Salir</button>
      </div>
    </header>

    <!-- ── VISTA JUGADOR ─────────────────────────────────────── -->
    <div id="player-view" hidden>
      <nav class="round-tabs" id="player-tabs">
        <button class="tab-btn active" data-round="dieciseisavos">16avos</button>
        <button class="tab-btn" data-round="octavos">Octavos</button>
        <button class="tab-btn" data-round="cuartos">Cuartos</button>
        <button class="tab-btn" data-round="semifinal">Semis</button>
        <button class="tab-btn" data-round="tercer_puesto">3er Puesto</button>
        <button class="tab-btn" data-round="final">Final</button>
        <button class="tab-btn" data-round="standings">🏅 Tabla</button>
      </nav>
      <div class="content-area" id="player-content"></div>
    </div>

    <!-- ── VISTA ADMIN ───────────────────────────────────────── -->
    <div id="admin-view" hidden>
      <div class="app-header" style="background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.3);height:36px;position:sticky;top:56px;z-index:95;">
        <span style="font-size:.8rem;color:#f85149;font-weight:700;">⚙️ PANEL ADMINISTRADOR</span>
        <span class="admin-badge">Admin</span>
      </div>
      <nav class="round-tabs" id="admin-tabs" style="top:92px;">
        <button class="tab-btn active" data-round="dieciseisavos">16avos</button>
        <button class="tab-btn" data-round="octavos">Octavos</button>
        <button class="tab-btn" data-round="cuartos">Cuartos</button>
        <button class="tab-btn" data-round="semifinal">Semis</button>
        <button class="tab-btn" data-round="tercer_puesto">3er Puesto</button>
        <button class="tab-btn" data-round="final">Final</button>
        <button class="tab-btn" data-round="standings">🏅 Tabla</button>
      </nav>
      <div class="content-area" id="admin-content"></div>
    </div>

  </div><!-- /app-screen -->

  <!-- ============================================================
       MODAL DE CONFIRMACIÓN
       ============================================================ -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal-box">
      <h3 id="modal-title">Confirmar</h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel"  class="btn btn-secondary">Cancelar</button>
        <button id="modal-confirm" class="btn btn-primary">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       TOAST
       ============================================================ -->
  <div id="toast" hidden></div>

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
